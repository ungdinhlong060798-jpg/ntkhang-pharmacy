<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NTK.Hang Pharmacy - Dashboard Realtime</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { 
      getFirestore, 
      collection, 
      query, 
      where, 
      getDocs, 
      orderBy, 
      limit,
      onSnapshot,
      Timestamp 
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyC-eIR4U5WWkh9B8EKVetLTynI-LykqaAU",
      authDomain: "ntkhang-pharmacy.firebaseapp.com",
      projectId: "ntkhang-pharmacy",
      storageBucket: "ntkhang-pharmacy.firebasestorage.app",
      messagingSenderId: "366824735651",
      appId: "1:366824735651:web:1eda84d39f3005a0b4d016"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    function formatMoney(amount) {
      if (!amount && amount !== 0) return '0 ₫';
      return Math.round(amount).toLocaleString('vi-VN') + ' ₫';
    }
    
    function formatDate(date) {
      const d = new Date(date);
      return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
    }
    
    function getStartOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    
    function getEndOfDay(date) {
      const d = new Date(date);
      d.setHours(23, 59, 59, 999);
      return d;
    }
    
    let currentChart = null;
    
    // ========== REALTIME: DOANH THU & SỐ ĐƠN HÔM NAY ==========
    function listenTodayStats() {
      const today = new Date();
      const startToday = getStartOfDay(today);
      const endToday = getEndOfDay(today);
      
      const ordersRef = collection(db, 'orders');
      const q = query(ordersRef, 
        where('createdAt', '>=', Timestamp.fromDate(startToday)),
        where('createdAt', '<=', Timestamp.fromDate(endToday))
      );
      
      onSnapshot(q, (snapshot) => {
        let totalRevenue = 0;
        snapshot.forEach(doc => {
          totalRevenue += doc.data().total || 0;
        });
        
        document.getElementById('todayRevenue').innerHTML = formatMoney(totalRevenue);
        document.getElementById('todayOrders').innerHTML = snapshot.size.toLocaleString('vi-VN');
      });
    }
    
    // ========== REALTIME: TOP 5 THUỐC BÁN CHẠY ==========
    function listenTopProducts() {
      const productsRef = collection(db, 'products');
      const q = query(productsRef, orderBy('sold', 'desc'), limit(5));
      
      onSnapshot(q, (snapshot) => {
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          products.push({
            name: data.name || 'Sản phẩm',
            sold: data.sold || 0
          });
        });
        
        if (products.length > 0) {
          document.getElementById('topProducts').innerHTML = products.map((p, idx) => `
            <li>
              <span class="staff-name">${idx + 1}. ${p.name}</span>
              <span class="staff-amount">${p.sold.toLocaleString('vi-VN')} đơn</span>
            </li>
          `).join('');
        } else {
          document.getElementById('topProducts').innerHTML = '<li>📭 Chưa có dữ liệu</li>';
        }
      });
    }
    
    // ========== REALTIME: TOP NHÂN VIÊN ==========
    function listenTopStaff() {
      const staffRef = collection(db, 'staff');
      const q = query(staffRef, orderBy('totalSales', 'desc'), limit(5));
      
      onSnapshot(q, (snapshot) => {
        const staff = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          staff.push({
            name: data.name || data.fullName || 'Nhân viên',
            total: data.totalSales || data.revenue || 0
          });
        });
        
        if (staff.length > 0) {
          document.getElementById('topStaff').innerHTML = staff.map((s, idx) => `
            <li>
              <span class="staff-name">${idx + 1}. ${s.name}</span>
              <span class="staff-amount">${formatMoney(s.total)}</span>
            </li>
          `).join('');
        } else {
          document.getElementById('topStaff').innerHTML = '<li>📭 Chưa có dữ liệu</li>';
        }
      });
    }
    
    // ========== REALTIME: THUỐC SẮP HẾT ==========
    function listenLowStock() {
      const productsRef = collection(db, 'products');
      const q = query(productsRef, where('stock', '<', 10));
      
      onSnapshot(q, (snapshot) => {
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          products.push({
            name: data.name || 'Sản phẩm',
            code: data.code || data.sku || '---',
            stock: data.stock || 0
          });
        });
        
        products.sort((a, b) => a.stock - b.stock);
        
        if (products.length > 0) {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td>${p.name}</td>
                  <td>${p.code}</td>
                  <td class="${p.stock < 5 ? 'stock-low' : 'stock-warning'}">${p.stock}</td>
                  <td>${p.stock < 5 ? '⚠️ Cần nhập ngay' : '⚡ Sắp hết'}</td>
                </tr>
              `).join('')}
            </tbody>
          `;
        } else {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="4" style="text-align:center">🎉 Tất cả hàng đều đủ! 🎉</td></tr>
            </tbody>
          `;
        }
      });
    }
    
    // ========== DOANH THU 7 NGÀY ==========
    async function loadRevenue7Days() {
      const dates = [];
      const revenues = [];
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const startDate = getStartOfDay(date);
        const endDate = getEndOfDay(date);
        
        dates.push(formatDate(date));
        
        try {
          const ordersRef = collection(db, 'orders');
          const q = query(ordersRef,
            where('createdAt', '>=', Timestamp.fromDate(startDate)),
            where('createdAt', '<=', Timestamp.fromDate(endDate))
          );
          
          const snapshot = await getDocs(q);
          let dailyTotal = 0;
          snapshot.forEach(doc => {
            dailyTotal += doc.data().total || 0;
          });
          revenues.push(dailyTotal);
        } catch (error) {
          revenues.push(0);
        }
      }
      
      drawChart(dates, revenues);
    }
    
    function drawChart(labels, values) {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      if (currentChart) currentChart.destroy();
      
      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Doanh thu',
            data: values,
            backgroundColor: '#2a9d6e',
            borderRadius: 6,
            barPercentage: 0.7,
            categoryPercentage: 0.8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return formatMoney(context.raw);
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return value.toLocaleString('vi-VN');
                },
                font: { size: 11 }
              }
            },
            x: {
              ticks: { font: { size: 11 } }
            }
          }
        }
      });
    }
    
    function updateTimestamp() {
      const now = new Date();
      document.getElementById('updateTime').innerHTML = `🔄 Cập nhật lần cuối: ${now.toLocaleString('vi-VN')}`;
    }
    
    // Khởi động
    listenTodayStats();
    listenTopProducts();
    listenTopStaff();
    listenLowStock();
    loadRevenue7Days();
    updateTimestamp();
    setInterval(updateTimestamp, 1000);
    
    // Refresh biểu đồ mỗi khi có đơn hàng mới
    const ordersRef = collection(db, 'orders');
    onSnapshot(ordersRef, () => {
      loadRevenue7Days();
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* QUAN TRỌNG: Đảm bảo không bị cắt ở bất kỳ zoom nào */
    html {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: auto;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f7f3;
      color: #1a3a2e;
      width: 100%;
      min-height: 100vh;
      padding: 16px;
      /* Cho phép cuộn ngang nếu cần */
      overflow-x: auto;
    }

    /* Container chính - responsive hoàn toàn */
    .dashboard {
      width: 100%;
      max-width: 1400px;
      min-width: 320px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    h1 {
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      color: #1a6d4c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .realtime-badge {
      background: #2a9d6e;
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* 2 ô trên cùng - co giãn linh hoạt */
    .top-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 16px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stat-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      color: #5a6e66;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .stat-number {
      font-size: clamp(24px, 6vw, 42px);
      font-weight: bold;
      color: #1a6d4c;
      word-break: break-word;
    }

    /* Hàng giữa - responsive quan trọng */
    .middle-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 16px;
    }

    .chart-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      min-width: 0; /* Quan trọng: tràn flex */
    }

    .chart-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 10px;
      color: #1a6d4c;
      padding-left: 6px;
    }

    .chart-container {
      width: 100%;
      height: auto;
      min-height: 220px;
      position: relative;
    }

    canvas {
      max-width: 100%;
      height: auto !important;
      max-height: 260px;
    }

    .right-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      flex: 1;
    }

    .info-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 10px;
      color: #1a6d4c;
      border-left: 3px solid #1a6d4c;
      padding-left: 10px;
    }

    .top-list {
      list-style: none;
    }

    .top-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e8f0ec;
      font-size: clamp(11px, 2.5vw, 14px);
    }

    .top-list li:last-child {
      border-bottom: none;
    }

    .staff-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
    }

    .staff-amount {
      color: #1a6d4c;
      font-weight: bold;
      white-space: nowrap;
    }

    /* Bảng dưới cùng - cuộn ngang nếu cần */
    .bottom-row {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow-x: auto;
    }

    .bottom-row h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 12px;
      color: #1a6d4c;
      border-left: 3px solid #1a6d4c;
      padding-left: 10px;
    }

    table {
      width: 100%;
      min-width: 400px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 6px;
      text-align: left;
      border-bottom: 1px solid #e8f0ec;
      font-size: clamp(11px, 2.5vw, 13px);
    }

    th {
      background: #f0f7f3;
      color: #1a6d4c;
      font-weight: 600;
    }

    .stock-low {
      color: #e74c3c;
      font-weight: bold;
    }

    .stock-warning {
      color: #f39c12;
      font-weight: bold;
    }

    .update-time {
      text-align: center;
      margin-top: 8px;
      color: #8aa99e;
      font-size: 11px;
    }

    /* ========== RESPONSIVE CHO MỌI KÍCH THƯỚC ========== */
    
    /* Màn hình nhỏ (dưới 768px) - chuyển sang dọc */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      .middle-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .chart-container {
        min-height: 200px;
      }
      .stat-card {
        padding: 12px;
      }
    }
    
    /* Màn hình rất nhỏ (dưới 480px) */
    @media (max-width: 480px) {
      .top-row {
        gap: 10px;
      }
      .staff-name, .staff-amount {
        font-size: 11px;
      }
    }
    
    /* Màn hình lớn (trên 1400px) - giữ tỷ lệ đẹp */
    @media (min-width: 1400px) {
      .dashboard {
        max-width: 1600px;
      }
      .stat-number {
        font-size: 48px;
      }
      .chart-container {
        min-height: 300px;
      }
    }
    
    /* Màn hình rất rộng */
    @media (min-width: 1920px) {
      .dashboard {
        max-width: 1800px;
      }
      body {
        padding: 24px;
      }
      .stat-number {
        font-size: 56px;
      }
      .chart-container {
        min-height: 350px;
      }
      th, td {
        padding: 12px 10px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>
    💊 NTK.Hang Pharmacy Dashboard 
    <span class="realtime-badge">🔴 LIVE</span>
  </h1>

  <div class="top-row">
    <div class="stat-card">
      <h3>💰 DOANH THU HÔM NAY</h3>
      <div class="stat-number" id="todayRevenue">0 ₫</div>
    </div>
    <div class="stat-card">
      <h3>📦 TỔNG SỐ ĐƠN HÔM NAY</h3>
      <div class="stat-number" id="todayOrders">0</div>
    </div>
  </div>

  <div class="middle-row">
    <div class="chart-card">
      <h3>📊 Biểu đồ doanh thu 7 ngày gần nhất</h3>
      <div class="chart-container">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="right-stack">
      <div class="info-card">
        <h3>🏆 Top 5 thuốc bán chạy</h3>
        <ul class="top-list" id="topProducts">
          <li>Đang tải...</li>
        </ul>
      </div>
      <div class="info-card">
        <h3>👩‍⚕️ Top nhân viên bán nhiều nhất</h3>
        <ul class="top-list" id="topStaff">
          <li>Đang tải...</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <h3>⚠️ Thuốc sắp hết hàng (tồn kho &lt; 10)</h3>
    <table id="lowStockTable">
      <thead>
        <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>
</body>
</html>
