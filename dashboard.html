<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NTK.Hang Pharmacy - Dashboard</title>

  <!-- Google Fonts đẹp hơn -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { 
      getFirestore, 
      collection, 
      query, 
      where, 
      getDocs, 
      orderBy, 
      limit,
      onSnapshot
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    
    // Đăng ký plugin datalabels
    Chart.register(ChartDataLabels);
    
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyC-eIR4U5WWkh9B8EKVetLTynI-LykqaAU",
      authDomain: "ntkhang-pharmacy.firebaseapp.com",
      projectId: "ntkhang-pharmacy",
      storageBucket: "ntkhang-pharmacy.firebasestorage.app",
      messagingSenderId: "366824735651",
      appId: "1:366824735651:web:1eda84d39f3005a0b4d016"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // ========== DARK MODE ==========
    function initDarkMode() {
      const savedMode = localStorage.getItem('darkMode');
      if (savedMode === 'enabled') {
        document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle').innerHTML = '🌙';
      } else {
        document.getElementById('darkModeToggle').innerHTML = '☀️';
      }
    }
    
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
      document.getElementById('darkModeToggle').innerHTML = isDark ? '🌙' : '☀️';
      setTimeout(() => {
        loadRevenue7Days();
        loadCompareRevenue();
      }, 100);
    }
    
    // ========== HÀM TIỆN ÍCH ==========
    function formatMoney(amount) {
      if (!amount && amount !== 0) return '0 ₫';
      return Math.round(amount).toLocaleString('vi-VN') + ' ₫';
    }
    
    function formatMoneyShort(amount) {
      if (!amount && amount !== 0) return '0₫';
      if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'tr';
      if (amount >= 1000) return (amount / 1000).toFixed(0) + 'k';
      return Math.round(amount).toLocaleString('vi-VN') + '₫';
    }
    
    // Tạo gradient màu cho cột
    function getBarGradient(ctx, chartArea, colorStart, colorEnd) {
      const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
      gradient.addColorStop(0, colorStart);
      gradient.addColorStop(1, colorEnd);
      return gradient;
    }
    
    // ========== XỬ LÝ MÚI GIỜ VIỆT NAM (UTC+7) ==========
    function getTodayVN() {
      const now = new Date();
      const vnDate = new Date(now.getTime() + (7 * 60 * 60 * 1000));
      return vnDate.toISOString().split('T')[0];
    }
    
    function getDateFromDatetimeVN(datetimeStr) {
      if (!datetimeStr) return null;
      const utcDate = new Date(datetimeStr);
      const vnDate = new Date(utcDate.getTime() + (7 * 60 * 60 * 1000));
      return vnDate.toISOString().split('T')[0];
    }
    
    let barChart = null;
    let compareChart = null;
    let pieChart = null;
    let horizontalBarChart = null;
    
    // ========== 1. REALTIME: DOANH THU & SỐ ĐƠN HÔM NAY ==========
    function listenTodayStats() {
      const ordersRef = collection(db, 'orders');
      const todayVN = getTodayVN();
      
      onSnapshot(ordersRef, (snapshot) => {
        let totalRevenue = 0;
        let orderCount = 0;
        
        snapshot.forEach(doc => {
          const order = doc.data();
          const orderDate = getDateFromDatetimeVN(order.datetime);
          
          if (orderDate === todayVN && order.status !== 'cancelled') {
            totalRevenue += order.total || 0;
            orderCount++;
          }
        });
        
        document.getElementById('todayRevenue').innerHTML = formatMoney(totalRevenue);
        document.getElementById('todayOrders').innerHTML = orderCount.toLocaleString('vi-VN');
      });
    }
    
    // ========== 2. REALTIME: TOP NHÂN VIÊN & BIỂU ĐỒ TRÒN ==========
    function listenTopStaffAndPieChart() {
      const ordersRef = collection(db, 'orders');
      
      onSnapshot(ordersRef, (snapshot) => {
        const staffSales = {};
        
        snapshot.forEach(doc => {
          const order = doc.data();
          if (order.status === 'cancelled') return;
          
          let employee = order.employee;
          if (!employee || employee === 'undefined' || employee === 'Unknown' || employee === '') {
            employee = 'Nhân viên';
          }
          const total = order.total || 0;
          
          if (staffSales[employee]) {
            staffSales[employee] += total;
          } else {
            staffSales[employee] = total;
          }
        });
        
        const staffArray = Object.entries(staffSales).map(([name, total]) => ({ name, total }));
        staffArray.sort((a, b) => b.total - a.total);
        
        drawPieChart(staffArray);
      });
    }
    
    function drawPieChart(staffData) {
      const canvas = document.getElementById('pieChart');
      if (!canvas) return;
      
      if (pieChart) {
        pieChart.destroy();
        pieChart = null;
      }
      
      if (!staffData || staffData.length === 0) return;
      
      const colors = ['#9b59b6', '#f1c40f', '#2a9d6e', '#e74c3c', '#3498db'];
      const labels = staffData.map(s => s.name);
      const values = staffData.map(s => s.total);
      const total = values.reduce((a, b) => a + b, 0);
      
      pieChart = new Chart(canvas, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: colors.slice(0, staffData.length),
            borderWidth: 0,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: { size: 10, family: "'Inter', sans-serif" },
                boxWidth: 12,
                generateLabels: function(chart) {
                  const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                  original.forEach((label, i) => {
                    const value = chart.data.datasets[0].data[i];
                    const percent = ((value / total) * 100).toFixed(1);
                    label.text = `${label.text}: ${formatMoneyShort(value)} (${percent}%)`;
                  });
                  return original;
                }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.label || '';
                  const value = context.raw || 0;
                  const percent = ((value / total) * 100).toFixed(1);
                  return `${label}: ${formatMoney(value)} (${percent}%)`;
                }
              }
            }
          }
        }
      });
    }
    
    // ========== 3. REALTIME: TOP 5 SẢN PHẨM (BIỂU ĐỒ THANH NGANG) ==========
    function listenTopProductsHorizontal() {
      const ordersRef = collection(db, 'orders');
      
      onSnapshot(ordersRef, (snapshot) => {
        const productSales = {};
        
        snapshot.forEach(doc => {
          const order = doc.data();
          if (order.status === 'cancelled') return;
          
          const items = order.items || [];
          items.forEach(item => {
            const productName = item.name;
            const quantity = item.quantity || 1;
            
            if (productSales[productName]) {
              productSales[productName] += quantity;
            } else {
              productSales[productName] = quantity;
            }
          });
        });
        
        const productsArray = Object.entries(productSales).map(([name, sold]) => ({ name, sold }));
        productsArray.sort((a, b) => b.sold - a.sold);
        const top5 = productsArray.slice(0, 5);
        
        drawHorizontalBarChart(top5);
      });
    }
    
    function drawHorizontalBarChart(data) {
      const canvas = document.getElementById('horizontalBarChart');
      if (!canvas) return;
      
      if (horizontalBarChart) {
        horizontalBarChart.destroy();
        horizontalBarChart = null;
      }
      
      if (!data || data.length === 0) return;
      
      const labels = data.map(p => p.name);
      const values = data.map(p => p.sold);
      
      horizontalBarChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Số lượng bán',
            data: values,
            backgroundColor: '#1a5276',
            borderRadius: 12,
            barPercentage: 0.7,
            categoryPercentage: 0.8
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            datalabels: {
              anchor: 'end',
              align: 'right',
              offset: 6,
              formatter: (value) => value,
              font: { size: 11, weight: 'bold', family: "'Inter', sans-serif" },
              color: '#1a5276',
              backgroundColor: 'rgba(255,255,255,0.8)',
              borderRadius: 12,
              padding: { left: 6, right: 6, top: 2, bottom: 2 }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `Số lượng: ${context.raw} cái`;
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { 
                font: { size: 10, family: "'Inter', sans-serif" },
                stepSize: 1,
                callback: function(val) {
                  return Number.isInteger(val) ? val : '';
                }
              },
              title: { display: true, text: 'Số lượng bán', font: { size: 11, family: "'Inter', sans-serif" } }
            },
            y: {
              grid: { display: false },
              ticks: { font: { size: 11, family: "'Inter', sans-serif" } }
            }
          }
        }
      });
    }
    
    // ========== 4. REALTIME: THUỐC SẮP HẾT ==========
    function listenLowStock() {
      const productsRef = collection(db, 'products');
      
      onSnapshot(productsRef, (snapshot) => {
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          const stock = data.stock || 0;
          if (stock < 10) {
            products.push({
              name: data.name || 'Sản phẩm',
              code: data.code || '---',
              stock: stock
            });
          }
        });
        
        products.sort((a, b) => a.stock - b.stock);
        
        if (products.length > 0) {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td>${p.name}</td>
                  <td>${p.code}</td>
                  <td class="${p.stock < 5 ? 'stock-low' : 'stock-warning'}">${p.stock}</td>
                  <td>${p.stock < 5 ? '⚠️ Cần nhập ngay' : '⚡ Sắp hết'}</td>
                </tr>
              `).join('')}
            </tbody>
          `;
        } else {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th><tr>
            </thead>
            <tbody>
              <tr><td colspan="4" style="text-align:center">🎉 Tất cả hàng đều đủ! 🎉</td>
              </tr>
            </tbody>
          `;
        }
      });
    }
    
    // ========== 5. DOANH THU 7 NGÀY (DECOR CAO CẤP) ==========
    async function loadRevenue7Days() {
      const labels = [];
      const revenues = [];
      
      for (let i = 6; i >= 0; i--) {
        const now = new Date();
        const vnNow = new Date(now.getTime() + (7 * 60 * 60 * 1000));
        vnNow.setDate(vnNow.getDate() - i);
        
        const displayDate = `${(vnNow.getMonth()+1).toString().padStart(2,'0')}-${vnNow.getDate().toString().padStart(2,'0')}`;
        labels.push(displayDate);
        
        const dateStr = `${vnNow.getFullYear()}-${(vnNow.getMonth()+1).toString().padStart(2,'0')}-${vnNow.getDate().toString().padStart(2,'0')}`;
        
        try {
          const ordersRef = collection(db, 'orders');
          const snapshot = await getDocs(ordersRef);
          
          let dailyTotal = 0;
          snapshot.forEach(doc => {
            const order = doc.data();
            if (order.status === 'cancelled') return;
            
            const orderDate = getDateFromDatetimeVN(order.datetime);
            if (orderDate === dateStr) {
              dailyTotal += order.total || 0;
            }
          });
          revenues.push(dailyTotal);
        } catch (error) {
          revenues.push(0);
        }
      }
      
      drawBarChartWithTrend(labels, revenues);
    }
    
    function drawBarChartWithTrend(labels, values) {
      const canvas = document.getElementById('barChart');
      if (!canvas) return;
      
      if (barChart) barChart.destroy();
      
      barChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Doanh thu',
              type: 'bar',
              data: values,
              backgroundColor: (context) => {
                const ctx = context.chart.ctx;
                const chartArea = context.chart.chartArea;
                if (!chartArea) return '#2a9d6e';
                return getBarGradient(ctx, chartArea, '#1a6d4c', '#2a9d6e');
              },
              borderRadius: 12,
              borderWidth: 2,
              borderColor: 'rgba(255,255,255,0.3)',
              barPercentage: 0.6,
              categoryPercentage: 0.7,
              datalabels: {
                anchor: 'end',
                align: 'top',
                offset: 8,
                formatter: (value) => value > 0 ? formatMoneyShort(value) : '',
                font: { size: 10, weight: 'bold', family: "'Inter', sans-serif" },
                color: '#1a6d4c',
                backgroundColor: 'rgba(255,255,255,0.9)',
                borderRadius: 16,
                padding: { left: 8, right: 8, top: 4, bottom: 4 },
                borderWidth: 1,
                borderColor: '#e0e0e0'
              }
            },
            {
              label: '📈 Xu hướng',
              type: 'line',
              data: values,
              borderColor: '#e74c3c',
              borderWidth: 3,
              pointRadius: 5,
              pointBackgroundColor: '#e74c3c',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointHoverRadius: 8,
              fill: false,
              tension: 0.3,
              datalabels: { display: false }
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          layout: {
            padding: { top: 30 }
          },
          plugins: {
            legend: {
              position: 'top',
              labels: { font: { size: 10, family: "'Inter', sans-serif" }, usePointStyle: true, boxWidth: 8 }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `${context.dataset.label}: ${formatMoney(context.raw)}`;
                }
              }
            },
            datalabels: { display: true }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { display: false },
              ticks: { 
                font: { size: 10, family: "'Inter', sans-serif" },
                callback: function(value) {
                  return value.toLocaleString('vi-VN');
                },
                maxTicksLimit: 6
              }
            },
            x: {
              grid: { display: false },
              ticks: { font: { size: 10, family: "'Inter', sans-serif" } }
            }
          }
        }
      });
    }
    
    // ========== 6. SO SÁNH DOANH THU ==========
    async function loadCompareRevenue() {
      const now = new Date();
      const vnNow = new Date(now.getTime() + (7 * 60 * 60 * 1000));
      const currentMonth = vnNow.getMonth();
      const currentYear = vnNow.getFullYear();
      
      let prevMonth = currentMonth - 1;
      let prevYear = currentYear;
      if (prevMonth < 0) {
        prevMonth = 11;
        prevYear--;
      }
      
      const weeks = ['Tuần 1', 'Tuần 2', 'Tuần 3', 'Tuần 4'];
      const currentMonthData = [0, 0, 0, 0];
      const prevMonthData = [0, 0, 0, 0];
      
      try {
        const ordersRef = collection(db, 'orders');
        const snapshot = await getDocs(ordersRef);
        
        snapshot.forEach(doc => {
          const order = doc.data();
          if (order.status === 'cancelled') return;
          
          const orderDate = getDateFromDatetimeVN(order.datetime);
          const [year, month, day] = orderDate.split('-').map(Number);
          
          const weekIndex = Math.min(Math.floor((day - 1) / 7), 3);
          
          if (year === currentYear && month === currentMonth + 1) {
            currentMonthData[weekIndex] += order.total || 0;
          } else if (year === prevYear && month === prevMonth + 1) {
            prevMonthData[weekIndex] += order.total || 0;
          }
        });
      } catch (error) {
        console.error('Lỗi lấy dữ liệu so sánh:', error);
      }
      
      drawCompareChart(weeks, currentMonthData, prevMonthData);
    }
    
    function drawCompareChart(labels, currentData, prevData) {
      const canvas = document.getElementById('compareChart');
      if (!canvas) return;
      
      if (compareChart) compareChart.destroy();
      
      compareChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Tháng này',
              data: currentData,
              borderColor: '#3498db',
              backgroundColor: 'rgba(52, 152, 219, 0.05)',
              borderWidth: 3,
              pointRadius: 6,
              pointBackgroundColor: '#3498db',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointHoverRadius: 10,
              tension: 0.3,
              fill: true,
              datalabels: {
                anchor: 'end',
                align: 'top',
                offset: 8,
                formatter: (value) => value > 0 ? formatMoneyShort(value) : '',
                font: { size: 9, weight: 'bold', family: "'Inter', sans-serif" },
                color: '#3498db',
                backgroundColor: 'rgba(255,255,255,0.85)',
                borderRadius: 12,
                padding: { left: 6, right: 6, top: 3, bottom: 3 }
              }
            },
            {
              label: 'Tháng trước',
              data: prevData,
              borderColor: '#e67e22',
              backgroundColor: 'rgba(230, 126, 34, 0.05)',
              borderWidth: 3,
              pointRadius: 6,
              pointBackgroundColor: '#e67e22',
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointHoverRadius: 10,
              tension: 0.3,
              fill: true,
              datalabels: {
                anchor: 'end',
                align: 'top',
                offset: 8,
                formatter: (value) => value > 0 ? formatMoneyShort(value) : '',
                font: { size: 9, weight: 'bold', family: "'Inter', sans-serif" },
                color: '#e67e22',
                backgroundColor: 'rgba(255,255,255,0.85)',
                borderRadius: 12,
                padding: { left: 6, right: 6, top: 3, bottom: 3 }
              }
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'top',
              labels: { font: { size: 10, family: "'Inter', sans-serif" }, usePointStyle: true, boxWidth: 8 }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `${context.dataset.label}: ${formatMoney(context.raw)}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { display: false },
              ticks: { 
                font: { size: 10, family: "'Inter', sans-serif" },
                callback: function(value) {
                  return value.toLocaleString('vi-VN');
                },
                maxTicksLimit: 6
              }
            },
            x: {
              grid: { display: false },
              ticks: { font: { size: 10, family: "'Inter', sans-serif" } }
            }
          }
        }
      });
    }
    
    function updateTimestamp() {
      const now = new Date();
      document.getElementById('updateTime').innerHTML = `🔄 Cập nhật lần cuối: ${now.toLocaleString('vi-VN')}`;
    }
    
    // ========== KHỞI ĐỘNG ==========
    console.log('🚀 Khởi động Dashboard với decor cao cấp');
    
    initDarkMode();
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    
    listenTodayStats();
    listenTopStaffAndPieChart();
    listenTopProductsHorizontal();
    listenLowStock();
    loadRevenue7Days();
    loadCompareRevenue();
    
    updateTimestamp();
    setInterval(updateTimestamp, 1000);
    
    const ordersRef = collection(db, 'orders');
    onSnapshot(ordersRef, () => {
      loadRevenue7Days();
      loadCompareRevenue();
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* FULL MÀN HÌNH - KHÔNG CUỘN NGANG */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      transition: background 0.3s ease;
    }

    /* Light mode (mặc định) */
    :root {
      --bg-color: #f0f7f3;
      --card-bg: white;
      --text-color: #1a3a2e;
      --border-color: #e8f0ec;
      --stat-number: #1a6d4c;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
    }

    /* Dark mode */
    body.dark-mode {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --text-color: #e0e0e0;
      --border-color: #2d2d44;
      --stat-number: #6ab04c;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Inter', 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif;
      color: var(--text-color);
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .dashboard {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      overflow-y: auto;
      padding-right: 6px;
    }
    
    .dashboard::-webkit-scrollbar {
      width: 6px;
    }
    .dashboard::-webkit-scrollbar-track {
      background: var(--border-color);
      border-radius: 10px;
    }
    .dashboard::-webkit-scrollbar-thumb {
      background: #2a9d6e;
      border-radius: 10px;
    }

    /* Header với nút Dark mode */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      color: var(--stat-number);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      font-weight: 700;
    }
    .dark-mode-btn {
      background: var(--card-bg);
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 40px;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }
    .dark-mode-btn:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-hover);
    }

    .realtime-badge {
      background: linear-gradient(135deg, #2a9d6e, #1a6d4c);
      color: white;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 30px;
      animation: pulse 2s infinite;
      font-weight: 600;
    }

    @keyframes pulse {
      0% { opacity: 0.7; box-shadow: 0 0 0 0 rgba(42, 157, 110, 0.4); }
      50% { opacity: 1; box-shadow: 0 0 0 4px rgba(42, 157, 110, 0); }
      100% { opacity: 0.7; box-shadow: 0 0 0 0 rgba(42, 157, 110, 0); }
    }

    .top-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      flex-shrink: 0;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 20px 16px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .stat-card h3 {
      font-size: 16px;
      color: #5a6e66;
      margin-bottom: 8px;
      font-weight: 500;
    }
    body.dark-mode .stat-card h3 {
      color: #aaa;
    }

    .stat-number {
      font-size: 42px;
      font-weight: 800;
      color: var(--stat-number);
      transition: transform 0.2s;
    }

    .row-2-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex-shrink: 0;
    }

    .chart-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    .chart-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .chart-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--stat-number);
      padding-left: 10px;
      font-weight: 600;
    }

    .chart-container {
      width: 100%;
      height: auto;
      min-height: 220px;
    }

    canvas {
      max-width: 100%;
      height: auto !important;
      max-height: 220px;
    }

    .row-3-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .pie-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: all 0.3s ease;
    }
    .pie-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .pie-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--stat-number);
      border-left: 4px solid var(--stat-number);
      padding-left: 14px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .pie-container {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .horizontal-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: all 0.3s ease;
    }
    .horizontal-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .horizontal-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--stat-number);
      border-left: 4px solid var(--stat-number);
      padding-left: 14px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .horizontal-container {
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    .bottom-row {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      overflow-x: auto;
      flex-shrink: 0;
      max-height: 180px;
      transition: all 0.3s ease;
    }
    .bottom-row:hover {
      box-shadow: var(--shadow-hover);
    }

    .bottom-row h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--stat-number);
      border-left: 4px solid var(--stat-number);
      padding-left: 14px;
      font-weight: 600;
    }

    table {
      width: 100%;
      min-width: 500px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      color: var(--text-color);
    }

    th {
      background: var(--bg-color);
      color: var(--stat-number);
      font-weight: 600;
    }

    .stock-low {
      color: #e74c3c;
      font-weight: bold;
    }

    .stock-warning {
      color: #f39c12;
      font-weight: bold;
    }

    .update-time {
      text-align: center;
      margin-top: 8px;
      color: #8aa99e;
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      body { padding: 12px; }
      .row-2-charts, .row-3-charts { grid-template-columns: 1fr; gap: 12px; }
      .stat-number { font-size: 32px; }
      h1 { font-size: 20px; }
    }
    
    @media (min-width: 1600px) {
      .stat-number { font-size: 48px; }
      .chart-container { min-height: 260px; }
      canvas { max-height: 260px; }
      .bottom-row { max-height: 200px; }
      th, td { font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div></div>
    <h1>
      💊 NTK.Hang Pharmacy Dashboard 
      <span class="realtime-badge">🔴 LIVE</span>
    </h1>
    <button class="dark-mode-btn" id="darkModeToggle">☀️</button>
  </div>

  <div class="top-row">
    <div class="stat-card">
      <h3>💰 DOANH THU HÔM NAY</h3>
      <div class="stat-number" id="todayRevenue">0 ₫</div>
    </div>
    <div class="stat-card">
      <h3>📦 TỔNG SỐ ĐƠN HÔM NAY</h3>
      <div class="stat-number" id="todayOrders">0</div>
    </div>
  </div>

  <div class="row-2-charts">
    <div class="chart-card">
      <h3>📊 Doanh thu 7 ngày</h3>
      <div class="chart-container">
        <canvas id="barChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>📈 So sánh doanh thu</h3>
      <div class="chart-container">
        <canvas id="compareChart"></canvas>
      </div>
    </div>
  </div>

  <div class="row-3-charts">
    <div class="pie-card">
      <h3>🥧 Doanh thu theo nhân viên</h3>
      <div class="pie-container">
        <canvas id="pieChart"></canvas>
      </div>
    </div>
    <div class="horizontal-card">
      <h3>📊 Top 5 sản phẩm bán chạy</h3>
      <div class="horizontal-container">
        <canvas id="horizontalBarChart"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <h3>⚠️ Thuốc sắp hết hàng (tồn kho &lt; 10)</h3>
    <table id="lowStockTable">
      <thead>
        <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>
</body>
</html>
