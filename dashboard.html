<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTK.Hang Pharmacy Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f8f5;
      font-family: Arial, sans-serif;
      color: #1f3d2f;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #1f6d52;
    }

    .top {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #2f7d5a;
    }

    .big-number {
      font-size: 48px;
      font-weight: bold;
    }

    .middle {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    ul {
      padding-left: 20px;
      margin: 0;
    }

</html>
