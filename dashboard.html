<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTK.Hang Pharmacy Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f8f5;
      font-family: Arial, sans-serif;
      color: #1f3d2f;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #1f6d52;
    }

    .top {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #2f7d5a;
    }

    .big-number {
      font-size: 48px;
      font-weight: bold;
    }

    .middle {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .side-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    ul {
      padding-left: 20px;
      margin: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #f0f7f3;
      color: #1f6d52;
    }
  </style>
</head>
<body>
  <h1>💊 NTK.Hang Pharmacy Dashboard</h1>

  <div class="top">
    <div class="card">
      <h2>💰 Tổng doanh thu</h2>
      <div class="big-number" id="totalRevenue">0 ₫</div>
    </div>
    <div class="card">
      <h2>🏆 Nhân viên xuất sắc</h2>
      <div id="topStaff"></div>
    </div>
  </div>

  <div class="middle">
    <div class="card">
      <h2>📊 Biểu đồ doanh thu 7 ngày</h2>
      <canvas id="revenueChart" width="400" height="200"></canvas>
    </div>
    <div class="side-list">
      <div class="card">
        <h2>⚠️ Hàng sắp hết (tồn < 10)</h2>
        <table id="lowStockTable">
          <thead>
            <tr><th>Tên sản phẩm</th><th>Mã</th><th>Tồn kho</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📋 Đơn hàng gần đây</h2>
    <table id="recentOrders">
      <thead>
        <tr><th>Mã đơn</th><th>Khách hàng</th><th>Tổng tiền</th><th>Ngày</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div style="text-align: center; margin-top: 20px; color: #666;" id="updateTime"></div>

  <script>
    // Hàm định dạng tiền tệ
    function formatMoney(amount) {
      return amount?.toLocaleString('vi-VN') + ' ₫' || '0 ₫';
    }

    // Dữ liệu mẫu
    const topStaffData = [
      { name: 'Nguyễn Văn A', total: 12500000 },
      { name: 'Trần Thị B', total: 9800000 },
      { name: 'Lê Văn C', total: 8700000 }
    ];

    const products = [
      { name: 'Paracetamol', code: 'P001', stock: 5 },
      { name: 'Amoxicillin', code: 'A002', stock: 3 },
      { name: 'Vitamin C', code: 'V003', stock: 15 },
      { name: 'Ibuprofen', code: 'I004', stock: 8 },
      { name: 'Omeprazole', code: 'O005', stock: 2 }
    ];

    // Tạo dữ liệu đơn hàng 7 ngày gần đây
    const orders = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dateStr = d.toISOString().slice(0, 10);
      const dailyTotal = Math.random() * 5000000 + 1000000;
      orders.push({
        id: `ORD${i}`,
        customer: `Khách ${i + 1}`,
        total: dailyTotal,
        dateTime: dateStr
      });
    }

    // 1. Hiển thị nhân viên xuất sắc
    const topStaff = topStaffData.map(staff => 
      `${staff.name} — ${formatMoney(staff.total)}`
    ).join('<br>');
    document.getElementById('topStaff').innerHTML = topStaff;

    // 2. Hiển thị hàng tồn kho thấp
    const lowStock = products.filter(p => (p.stock || 0) < 10).sort((a, b) => a.stock - b.stock);
    document.getElementById('lowStockTable').innerHTML = `
      <tbody>
        ${lowStock.map(p => ` 
          <tr>
            <td>${p.name}</td>
            <td>${p.code}</td>
            <td style="color: ${p.stock < 5 ? 'red' : 'orange'}; font-weight: bold;">${p.stock}</td>
          </tr>
        `).join('')}
      </tbody>
    `;

    // 3. Vẽ biểu đồ doanh thu 7 ngày
    const labels = [];
    const values = [];
    
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      labels.push(key.slice(5)); // Hiển thị MM-DD
      
      const revenue = orders
        .filter(o => o.dateTime && o.dateTime.slice(0, 10) === key)
        .reduce((sum, o) => sum + (o.total || 0), 0);
      values.push(revenue);
    }

    // Tính tổng doanh thu
    const totalRevenue = values.reduce((sum, val) => sum + val, 0);
    document.getElementById('totalRevenue').innerHTML = formatMoney(totalRevenue);

    // Tạo biểu đồ
    new Chart(document.getElementById('revenueChart'), { 
      type: 'bar', 
      data: { 
        labels, 
        datasets: [{ 
          label: 'Doanh thu', 
          data: values,
          backgroundColor: '#2f7d5a',
          borderRadius: 8
        }] 
      }, 
      options: { 
        responsive: true, 
        maintainAspectRatio: true,
        plugins: { 
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                return formatMoney(context.raw);
              }
            }
          }
        }, 
        scales: { 
          y: { 
            ticks: { 
              callback: value => value.toLocaleString('vi-VN')
            } 
          } 
        } 
      }
    });

    // 4. Hiển thị đơn hàng gần đây
    const recentOrders = orders.slice(-5).reverse();
    document.getElementById('recentOrders').innerHTML = `
      <tbody>
        ${recentOrders.map(order => `
          <tr>
            <td>${order.id}</td>
            <td>${order.customer}</td>
            <td>${formatMoney(order.total)}</td>
            <td>${order.dateTime}</td>
          </tr>
        `).join('')}
      </tbody>
    `;

    // 5. Cập nhật thời gian
    document.getElementById('updateTime').textContent = 'Cập nhật: ' + new Date().toLocaleString('vi-VN');
  </script>
</body>
</html>
