<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NTK.Hang Pharmacy - Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { 
      getFirestore, 
      collection, 
      query, 
      where, 
      getDocs, 
      orderBy, 
      limit,
      onSnapshot
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyC-eIR4U5WWkh9B8EKVetLTynI-LykqaAU",
      authDomain: "ntkhang-pharmacy.firebaseapp.com",
      projectId: "ntkhang-pharmacy",
      storageBucket: "ntkhang-pharmacy.firebasestorage.app",
      messagingSenderId: "366824735651",
      appId: "1:366824735651:web:1eda84d39f3005a0b4d016"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // ========== HÀM TIỆN ÍCH ==========
    function formatMoney(amount) {
      if (!amount && amount !== 0) return '0 ₫';
      return Math.round(amount).toLocaleString('vi-VN') + ' ₫';
    }
    
    // ========== XỬ LÝ MÚI GIỜ VIỆT NAM (UTC+7) ==========
    function getTodayVN() {
      const now = new Date();
      const vnDate = new Date(now.getTime() + (7 * 60 * 60 * 1000));
      return vnDate.toISOString().split('T')[0];
    }
    
    function getDateFromDatetimeVN(datetimeStr) {
      if (!datetimeStr) return null;
      const utcDate = new Date(datetimeStr);
      const vnDate = new Date(utcDate.getTime() + (7 * 60 * 60 * 1000));
      return vnDate.toISOString().split('T')[0];
    }
    
    function getDisplayDateVN(date) {
      const vnDate = new Date(date.getTime() + (7 * 60 * 60 * 1000));
      return `${(vnDate.getMonth()+1).toString().padStart(2,'0')}-${vnDate.getDate().toString().padStart(2,'0')}`;
    }
    
    let currentChart = null;
    
    // ========== 1. REALTIME: DOANH THU & SỐ ĐƠN HÔM NAY ==========
    function listenTodayStats() {
      const ordersRef = collection(db, 'orders');
      const todayVN = getTodayVN();
      
      onSnapshot(ordersRef, (snapshot) => {
        let totalRevenue = 0;
        let orderCount = 0;
        
        snapshot.forEach(doc => {
          const order = doc.data();
          const orderDate = getDateFromDatetimeVN(order.datetime);
          
          if (orderDate === todayVN && order.status !== 'cancelled') {
            totalRevenue += order.total || 0;
            orderCount++;
          }
        });
        
        document.getElementById('todayRevenue').innerHTML = formatMoney(totalRevenue);
        document.getElementById('todayOrders').innerHTML = orderCount.toLocaleString('vi-VN');
        
        // Hiệu ứng flash khi có thay đổi
        const revenueEl = document.getElementById('todayRevenue');
        revenueEl.style.transform = 'scale(1.02)';
        setTimeout(() => revenueEl.style.transform = 'scale(1)', 200);
        
        console.log(`📊 Hôm nay (VN): ${todayVN} - ${orderCount} đơn, ${formatMoney(totalRevenue)}`);
      }, (error) => {
        console.error('Lỗi lắng nghe orders:', error);
      });
    }
    
    // ========== 2. REALTIME: TOP 5 THUỐC BÁN CHẠY ==========
    function listenTopProducts() {
      const ordersRef = collection(db, 'orders');
      
      onSnapshot(ordersRef, (snapshot) => {
        const productSales = {};
        
        snapshot.forEach(doc => {
          const order = doc.data();
          if (order.status === 'cancelled') return;
          
          const items = order.items || [];
          items.forEach(item => {
            const productName = item.name;
            const quantity = item.quantity || 1;
            
            if (productSales[productName]) {
              productSales[productName] += quantity;
            } else {
              productSales[productName] = quantity;
            }
          });
        });
        
        const productsArray = Object.entries(productSales).map(([name, sold]) => ({ name, sold }));
        productsArray.sort((a, b) => b.sold - a.sold);
        const top5 = productsArray.slice(0, 5);
        
        if (top5.length > 0) {
          document.getElementById('topProducts').innerHTML = top5.map((p, idx) => `
            <li>
              <span class="staff-name">${idx + 1}. ${p.name}</span>
              <span class="staff-amount">${p.sold.toLocaleString('vi-VN')} cái</span>
            </li>
          `).join('');
        } else {
          document.getElementById('topProducts').innerHTML = '<li>📭 Chưa có dữ liệu</li>';
        }
      });
    }
    
    // ========== 3. REALTIME: TOP NHÂN VIÊN ==========
    function listenTopStaff() {
      const ordersRef = collection(db, 'orders');
      
      onSnapshot(ordersRef, (snapshot) => {
        const staffSales = {};
        
        snapshot.forEach(doc => {
          const order = doc.data();
          if (order.status === 'cancelled') return;
          
          const employee = order.employee || 'Unknown';
          const total = order.total || 0;
          
          if (staffSales[employee]) {
            staffSales[employee] += total;
          } else {
            staffSales[employee] = total;
          }
        });
        
        const staffArray = Object.entries(staffSales).map(([name, total]) => ({ name, total }));
        staffArray.sort((a, b) => b.total - a.total);
        const top5 = staffArray.slice(0, 5);
        
        if (top5.length > 0) {
          document.getElementById('topStaff').innerHTML = top5.map((s, idx) => `
            <li>
              <span class="staff-name">${idx + 1}. ${s.name}</span>
              <span class="staff-amount">${formatMoney(s.total)}</span>
            </li>
          `).join('');
        } else {
          document.getElementById('topStaff').innerHTML = '<li>📭 Chưa có dữ liệu</li>';
        }
      });
    }
    
    // ========== 4. REALTIME: THUỐC SẮP HẾT (stock < 10) ==========
    function listenLowStock() {
      const productsRef = collection(db, 'products');
      
      onSnapshot(productsRef, (snapshot) => {
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          const stock = data.stock || 0;
          if (stock < 10) {
            products.push({
              name: data.name || 'Sản phẩm',
              code: data.code || '---',
              stock: stock
            });
          }
        });
        
        products.sort((a, b) => a.stock - b.stock);
        
        if (products.length > 0) {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
            </thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td>${p.name}</td>
                  <td>${p.code}</td>
                  <td class="${p.stock < 5 ? 'stock-low' : 'stock-warning'}">${p.stock}</td>
                  <td>${p.stock < 5 ? '⚠️ Cần nhập ngay' : '⚡ Sắp hết'}</td>
                </tr>
              `).join('')}
            </tbody>
          `;
        } else {
          document.getElementById('lowStockTable').innerHTML = `
            <thead>
              <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="4" style="text-align:center">🎉 Tất cả hàng đều đủ! 🎉</td></tr>
            </tbody>
          `;
        }
      });
    }
    
    // ========== 5. DOANH THU 7 NGÀY (THEO MÚI GIỜ VN) ==========
    async function loadRevenue7Days() {
      const dates = [];
      const revenues = [];
      
      for (let i = 6; i >= 0; i--) {
        const now = new Date();
        const vnNow = new Date(now.getTime() + (7 * 60 * 60 * 1000));
        vnNow.setDate(vnNow.getDate() - i);
        
        const dateStr = vnNow.toISOString().split('T')[0];
        const displayDate = `${(vnNow.getMonth()+1).toString().padStart(2,'0')}-${vnNow.getDate().toString().padStart(2,'0')}`;
        dates.push(displayDate);
        
        try {
          const ordersRef = collection(db, 'orders');
          const snapshot = await getDocs(ordersRef);
          
          let dailyTotal = 0;
          snapshot.forEach(doc => {
            const order = doc.data();
            const orderDate = getDateFromDatetimeVN(order.datetime);
            if (orderDate === dateStr && order.status !== 'cancelled') {
              dailyTotal += order.total || 0;
            }
          });
          revenues.push(dailyTotal);
        } catch (error) {
          revenues.push(0);
        }
      }
      
      drawChart(dates, revenues);
    }
    
    function drawChart(labels, values) {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      if (currentChart) currentChart.destroy();
      
      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Doanh thu',
            data: values,
            backgroundColor: '#2a9d6e',
            borderRadius: 6,
            barPercentage: 0.7
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return formatMoney(context.raw);
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: function(value) {
                  return value.toLocaleString('vi-VN');
                }
              }
            }
          }
        }
      });
    }
    
   function updateTimestamp() {
  const now = new Date();
  document.getElementById('updateTime').innerHTML = `🔄 Cập nhật lần cuối: ${now.toLocaleString('vi-VN')}`;
}
    
    // ========== KHỞI ĐỘNG ==========
    console.log('🚀 Khởi động Dashboard (múi giờ VN UTC+7)');
    console.log(`📅 Hôm nay theo VN: ${getTodayVN()}`);
    
    listenTodayStats();
    listenTopProducts();
    listenTopStaff();
    listenLowStock();
    loadRevenue7Days();
    
    updateTimestamp();
    setInterval(updateTimestamp, 1000);
    
    // Refresh biểu đồ khi có đơn hàng mới
    const ordersRef = collection(db, 'orders');
    onSnapshot(ordersRef, () => {
      loadRevenue7Days();
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      overflow-x: auto;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f7f3;
      color: #1a3a2e;
      width: 100%;
      min-height: 100vh;
      padding: 16px;
      overflow-x: auto;
    }

    .dashboard {
      width: 100%;
      max-width: 1400px;
      min-width: 320px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      color: #1a6d4c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .realtime-badge {
      background: #2a9d6e;
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .top-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 16px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stat-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      color: #5a6e66;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .stat-number {
      font-size: clamp(24px, 6vw, 42px);
      font-weight: bold;
      color: #1a6d4c;
      transition: transform 0.2s;
    }

    .middle-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 16px;
    }

    .chart-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chart-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 10px;
      color: #1a6d4c;
      padding-left: 6px;
    }

    .chart-container {
      width: 100%;
      height: auto;
      min-height: 220px;
    }

    canvas {
      max-width: 100%;
      height: auto !important;
      max-height: 260px;
    }

    .right-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      flex: 1;
    }

    .info-card h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 10px;
      color: #1a6d4c;
      border-left: 3px solid #1a6d4c;
      padding-left: 10px;
    }

    .top-list {
      list-style: none;
    }

    .top-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e8f0ec;
      font-size: clamp(11px, 2.5vw, 14px);
    }

    .top-list li:last-child {
      border-bottom: none;
    }

    .staff-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
    }

    .staff-amount {
      color: #1a6d4c;
      font-weight: bold;
    }

    .bottom-row {
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow-x: auto;
    }

    .bottom-row h3 {
      font-size: clamp(12px, 3vw, 16px);
      margin-bottom: 12px;
      color: #1a6d4c;
      border-left: 3px solid #1a6d4c;
      padding-left: 10px;
    }

    table {
      width: 100%;
      min-width: 400px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 6px;
      text-align: left;
      border-bottom: 1px solid #e8f0ec;
      font-size: clamp(11px, 2.5vw, 13px);
    }

    th {
      background: #f0f7f3;
      color: #1a6d4c;
      font-weight: 600;
    }

    .stock-low {
      color: #e74c3c;
      font-weight: bold;
    }

    .stock-warning {
      color: #f39c12;
      font-weight: bold;
    }

    .update-time {
      text-align: center;
      margin-top: 8px;
      color: #8aa99e;
      font-size: 11px;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .middle-row { grid-template-columns: 1fr; gap: 12px; }
      .chart-container { min-height: 200px; }
    }

    @media (min-width: 1400px) {
      .dashboard { max-width: 1600px; }
      .stat-number { font-size: 48px; }
      .chart-container { min-height: 300px; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>
    💊 NTK.Hang Pharmacy Dashboard 
    <span class="realtime-badge">🔴 LIVE</span>
  </h1>

  <div class="top-row">
    <div class="stat-card">
      <h3>💰 DOANH THU HÔM NAY</h3>
      <div class="stat-number" id="todayRevenue">0 ₫</div>
    </div>
    <div class="stat-card">
      <h3>📦 TỔNG SỐ ĐƠN HÔM NAY</h3>
      <div class="stat-number" id="todayOrders">0</div>
    </div>
  </div>

  <div class="middle-row">
    <div class="chart-card">
      <h3>📊 Biểu đồ doanh thu 7 ngày gần nhất</h3>
      <div class="chart-container">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="right-stack">
      <div class="info-card">
        <h3>🏆 Top 5 thuốc bán chạy</h3>
        <ul class="top-list" id="topProducts">
          <li>Đang tải...</li>
        </ul>
      </div>
      <div class="info-card">
        <h3>👩‍⚕️ Top nhân viên bán nhiều nhất</h3>
        <ul class="top-list" id="topStaff">
          <li>Đang tải...</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <h3>⚠️ Thuốc sắp hết hàng (tồn kho &lt; 10)</h3>
    <table id="lowStockTable">
      <thead>
        <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>
</body>
</html>
