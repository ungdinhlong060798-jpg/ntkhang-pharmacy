<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NTK.Hang Pharmacy - Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Firebase SDK (phiên bản 9+ modular) -->
  <script type="module">
    // ========== IMPORT FIREBASE ==========
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { 
      getFirestore, 
      collection, 
      query, 
      where, 
      getDocs, 
      orderBy, 
      limit,
      Timestamp 
    } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    
    // ========== CẤU HÌNH FIREBASE (THAY BẰNG CỦA BẠN) ==========
    // 🔥 COPY TỪ file index.html CỦA BẠN VÀO ĐÂY 🔥
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // ========== HÀM TIỆN ÍCH ==========
    function formatMoney(amount) {
      if (!amount && amount !== 0) return '0 ₫';
      return Math.round(amount).toLocaleString('vi-VN') + ' ₫';
    }
    
    function formatDate(date) {
      const d = new Date(date);
      return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
    }
    
    // Lấy đầu ngày và cuối ngày
    function getStartOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    
    function getEndOfDay(date) {
      const d = new Date(date);
      d.setHours(23, 59, 59, 999);
      return d;
    }
    
    // ========== 1. DOANH THU & SỐ ĐƠN HÔM NAY ==========
    async function getTodayStats() {
      const today = new Date();
      const startToday = getStartOfDay(today);
      const endToday = getEndOfDay(today);
      
      const ordersRef = collection(db, 'orders');
      const q = query(ordersRef, 
        where('createdAt', '>=', Timestamp.fromDate(startToday)),
        where('createdAt', '<=', Timestamp.fromDate(endToday))
      );
      
      const snapshot = await getDocs(q);
      let totalRevenue = 0;
      snapshot.forEach(doc => {
        const data = doc.data();
        totalRevenue += data.total || 0;
      });
      
      return {
        revenue: totalRevenue,
        orderCount: snapshot.size
      };
    }
    
    // ========== 2. TOP 5 THUỐC BÁN CHẠY ==========
    async function getTopProducts() {
      try {
        // Thử lấy từ collection 'products' với field 'sold'
        const productsRef = collection(db, 'products');
        const q = query(productsRef, orderBy('sold', 'desc'), limit(5));
        const snapshot = await getDocs(q);
        
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          products.push({
            name: data.name || data.productName || 'Unknown',
            sold: data.sold || data.quantitySold || 0
          });
        });
        
        return products;
      } catch (error) {
        console.log('Lỗi lấy top products:', error);
        // Nếu chưa có field 'sold', dùng mẫu
        return [
          { name: "Paracetamol 500mg", sold: 245 },
          { name: "Amoxicillin 250mg", sold: 198 },
          { name: "Vitamin C 1000mg", sold: 167 },
          { name: "Ibuprofen 400mg", sold: 134 },
          { name: "Omeprazole 20mg", sold: 112 }
        ];
      }
    }
    
    // ========== 3. TOP NHÂN VIÊN ==========
    async function getTopStaff() {
      try {
        // Thử lấy từ collection 'users' hoặc 'staff'
        let staffRef;
        try {
          staffRef = collection(db, 'staff');
          const q = query(staffRef, orderBy('totalSales', 'desc'), limit(5));
          const snapshot = await getDocs(q);
          const staff = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            staff.push({
              name: data.name || data.fullName || data.displayName,
              total: data.totalSales || data.revenue || 0
            });
          });
          if (staff.length > 0) return staff;
        } catch(e) {}
        
        // Thử collection 'users'
        staffRef = collection(db, 'users');
        const q = query(staffRef, orderBy('totalSales', 'desc'), limit(5));
        const snapshot = await getDocs(q);
        const staff = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          staff.push({
            name: data.name || data.fullName || data.displayName || data.email,
            total: data.totalSales || data.revenue || 0
          });
        });
        
        return staff.length > 0 ? staff : [
          { name: "Nguyễn Văn A", total: 12500000 },
          { name: "Trần Thị B", total: 9800000 },
          { name: "Lê Văn C", total: 8700000 },
          { name: "Phạm Thị D", total: 7200000 },
          { name: "Hoàng Văn E", total: 6500000 }
        ];
      } catch (error) {
        console.log('Lỗi lấy top staff:', error);
        return [
          { name: "Nguyễn Văn A", total: 12500000 },
          { name: "Trần Thị B", total: 9800000 },
          { name: "Lê Văn C", total: 8700000 },
          { name: "Phạm Thị D", total: 7200000 },
          { name: "Hoàng Văn E", total: 6500000 }
        ];
      }
    }
    
    // ========== 4. THUỐC SẮP HẾT (stock < 10) ==========
    async function getLowStock() {
      try {
        const productsRef = collection(db, 'products');
        const q = query(productsRef, where('stock', '<', 10));
        const snapshot = await getDocs(q);
        
        const products = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          products.push({
            name: data.name || data.productName,
            code: data.code || data.sku || data.productCode,
            stock: data.stock || 0
          });
        });
        
        if (products.length === 0) {
          return [
            { name: "Aspirin", code: "A007", stock: 1 },
            { name: "Omeprazole", code: "O005", stock: 2 },
            { name: "Amoxicillin", code: "A002", stock: 3 },
            { name: "Loratadine", code: "L006", stock: 4 },
            { name: "Paracetamol", code: "P001", stock: 5 }
          ];
        }
        
        products.sort((a, b) => a.stock - b.stock);
        return products;
      } catch (error) {
        console.log('Lỗi lấy low stock:', error);
        return [
          { name: "Aspirin", code: "A007", stock: 1 },
          { name: "Omeprazole", code: "O005", stock: 2 },
          { name: "Amoxicillin", code: "A002", stock: 3 }
        ];
      }
    }
    
    // ========== 5. DOANH THU 7 NGÀY ==========
    async function getRevenue7Days() {
      const dates = [];
      const revenues = [];
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const startDate = getStartOfDay(date);
        const endDate = getEndOfDay(date);
        
        dates.push(formatDate(date));
        
        try {
          const ordersRef = collection(db, 'orders');
          const q = query(ordersRef,
            where('createdAt', '>=', Timestamp.fromDate(startDate)),
            where('createdAt', '<=', Timestamp.fromDate(endDate))
          );
          
          const snapshot = await getDocs(q);
          let dailyTotal = 0;
          snapshot.forEach(doc => {
            dailyTotal += doc.data().total || 0;
          });
          revenues.push(dailyTotal);
        } catch (error) {
          // Nếu chưa có dữ liệu, dùng mẫu
          const mockData = [1406347, 5234495, 5372788, 5398766, 3278369, 4852000, 6100000];
          revenues.push(mockData[i]);
        }
      }
      
      return { dates, revenues };
    }
    
    // ========== VẼ BIỂU ĐỒ ==========
    let chartInstance = null;
    
    function drawChart(labels, values) {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Doanh thu',
            data: values,
            backgroundColor: '#2a9d6e',
            borderRadius: 8,
            barPercentage: 0.65
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return formatMoney(context.raw);
                }
              }
            }
          },
          scales: {
            y: {
              ticks: {
                callback: function(value) {
                  return value.toLocaleString('vi-VN') + ' ₫';
                }
              }
            }
          }
        }
      });
    }
    
    // ========== HIỂN THỊ DASHBOARD ==========
    async function loadDashboard() {
      try {
        // Hiển thị loading
        document.getElementById('todayRevenue').innerHTML = 'Đang tải...';
        document.getElementById('todayOrders').innerHTML = 'Đang tải...';
        
        // Lấy tất cả dữ liệu song song
        const [todayStats, topProducts, topStaff, lowStock, revenueData] = await Promise.all([
          getTodayStats(),
          getTopProducts(),
          getTopStaff(),
          getLowStock(),
          getRevenue7Days()
        ]);
        
        // Cập nhật doanh thu & số đơn hôm nay
        document.getElementById('todayRevenue').innerHTML = formatMoney(todayStats.revenue);
        document.getElementById('todayOrders').innerHTML = todayStats.orderCount.toLocaleString('vi-VN');
        
        // Cập nhật top sản phẩm
        const topProductsHtml = topProducts.map((p, idx) => `
          <li>
            <span class="staff-name">${idx + 1}. ${p.name}</span>
            <span class="staff-amount">${p.sold.toLocaleString('vi-VN')} đơn</span>
          </li>
        `).join('');
        document.getElementById('topProducts').innerHTML = topProductsHtml || '<li>Chưa có dữ liệu</li>';
        
        // Cập nhật top nhân viên
        const topStaffHtml = topStaff.map((staff, idx) => `
          <li>
            <span class="staff-name">${idx + 1}. ${staff.name}</span>
            <span class="staff-amount">${formatMoney(staff.total)}</span>
          </li>
        `).join('');
        document.getElementById('topStaff').innerHTML = topStaffHtml || '<li>Chưa có dữ liệu</li>';
        
        // Cập nhật bảng hàng sắp hết
        const lowStockHtml = lowStock.map(p => `
          <tr>
            <td>${p.name}</td>
            <td>${p.code || '---'}</td>
            <td class="${p.stock < 5 ? 'stock-low' : 'stock-warning'}">${p.stock}</td>
            <td>${p.stock < 5 ? '⚠️ Cần nhập ngay' : '⚡ Sắp hết'}</td>
          </tr>
        `).join('');
        
        document.getElementById('lowStockTable').innerHTML = `
          <thead>
            <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
          </thead>
          <tbody>
            ${lowStockHtml || '<tr><td colspan="4">🎉 Không có hàng sắp hết!</td></tr>'}
          </tbody>
        `;
        
        // Vẽ biểu đồ
        drawChart(revenueData.dates, revenueData.revenues);
        
        // Cập nhật thời gian
        document.getElementById('updateTime').innerHTML = `🔄 Cập nhật: ${new Date().toLocaleString('vi-VN')}`;
        
      } catch (error) {
        console.error('Lỗi tải dashboard:', error);
        document.getElementById('todayRevenue').innerHTML = 'Lỗi tải';
        document.getElementById('topProducts').innerHTML = '<li>❌ Lỗi kết nối Firebase</li>';
      }
    }
    
    // Chạy dashboard
    loadDashboard();
    
    // Tự động refresh mỗi 5 phút
    setInterval(loadDashboard, 5 * 60 * 1000);
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: #f0f7f3;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 16px;
      color: #1a3a2e;
      min-height: 100vh;
    }

    .dashboard {
      width: 100%;
      height: 100%;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 0;
      color: #1a6d4c;
      font-size: clamp(20px, 4vw, 28px);
    }

    /* 2 ô trên cùng */
    .top-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    .stat-card h3 {
      font-size: clamp(14px, 2.5vw, 18px);
      color: #5a6e66;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .stat-number {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: bold;
      color: #1a6d4c;
    }

    /* Giữa: biểu đồ + 2 box phải */
    .middle-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 16px;
      min-height: 380px;
    }

    .chart-card {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }

    .chart-card h3 {
      font-size: clamp(14px, 2.5vw, 18px);
      margin-bottom: 12px;
      color: #1a6d4c;
      padding-left: 8px;
    }

    .chart-container {
      flex: 1;
      min-height: 280px;
    }

    canvas {
      max-height: 100%;
      width: 100% !important;
    }

    .right-stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      flex: 1;
    }

    .info-card h3 {
      font-size: clamp(14px, 2.5vw, 18px);
      margin-bottom: 12px;
      color: #1a6d4c;
      border-left: 4px solid #1a6d4c;
      padding-left: 12px;
    }

    .top-list {
      list-style: none;
    }

    .top-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e8f0ec;
    }

    .top-list li:last-child {
      border-bottom: none;
    }

    .staff-name {
      font-weight: 500;
      font-size: clamp(12px, 2vw, 14px);
    }

    .staff-amount {
      color: #1a6d4c;
      font-weight: bold;
      font-size: clamp(12px, 2vw, 14px);
    }

    /* Bảng dưới cùng */
    .bottom-row {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-height: 320px;
      overflow-y: auto;
    }

    .bottom-row h3 {
      font-size: clamp(14px, 2.5vw, 18px);
      margin-bottom: 12px;
      color: #1a6d4c;
      border-left: 4px solid #1a6d4c;
      padding-left: 12px;
      position: sticky;
      top: 0;
      background: white;
      padding-top: 4px;
      padding-bottom: 4px;
      z-index: 10;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #e8f0ec;
      font-size: clamp(12px, 2vw, 14px);
    }

    th {
      background: #f0f7f3;
      color: #1a6d4c;
      font-weight: 600;
      position: sticky;
      top: 52px;
    }

    .stock-low {
      color: #e74c3c;
      font-weight: bold;
    }

    .stock-warning {
      color: #f39c12;
      font-weight: bold;
    }

    .update-time {
      text-align: center;
      margin-top: 8px;
      color: #8aa99e;
      font-size: 12px;
    }

    /* Responsive mobile */
    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      .middle-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .chart-container {
        min-height: 220px;
      }
      .bottom-row {
        max-height: 280px;
      }
      .stat-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>💊 NTK.Hang Pharmacy Dashboard</h1>

  <!-- Hàng trên -->
  <div class="top-row">
    <div class="stat-card">
      <h3>💰 DOANH THU HÔM NAY</h3>
      <div class="stat-number" id="todayRevenue">-- ₫</div>
    </div>
    <div class="stat-card">
      <h3>📦 TỔNG SỐ ĐƠN HÔM NAY</h3>
      <div class="stat-number" id="todayOrders">--</div>
    </div>
  </div>

  <!-- Hàng giữa -->
  <div class="middle-row">
    <div class="chart-card">
      <h3>📊 Biểu đồ doanh thu 7 ngày gần nhất</h3>
      <div class="chart-container">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <div class="right-stack">
      <div class="info-card">
        <h3>🏆 Top 5 thuốc bán chạy</h3>
        <ul class="top-list" id="topProducts">
          <li>Đang tải...</li>
        </ul>
      </div>
      <div class="info-card">
        <h3>👩‍⚕️ Top nhân viên bán nhiều nhất</h3>
        <ul class="top-list" id="topStaff">
          <li>Đang tải...</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Hàng dưới -->
  <div class="bottom-row">
    <h3>⚠️ Thuốc sắp hết hàng (tồn kho &lt; 10)</h3>
    <table id="lowStockTable">
      <thead>
        <tr><th>Tên thuốc</th><th>Mã</th><th>Tồn kho</th><th>Trạng thái</th></tr>
      </thead>
      <tbody>
        <tr><td colspan="4">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>
</body>
</html>
