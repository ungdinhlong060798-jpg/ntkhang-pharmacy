        if (!newProduct.price || isNaN(newProduct.price) || Number(newProduct.price) <= 0) return setAddError('Giá phải là số dương.');
        if (newProduct.stock === '' || isNaN(newProduct.stock) || Number(newProduct.stock) < 0) return setAddError('Tồn kho phải là số không âm.');
        if (products.find(p => p.code === newProduct.code.trim())) return setAddError('Mã sản phẩm đã tồn tại!');
        try {
          const added = { no: products.length + 1, code: newProduct.code.trim(), name: newProduct.name.trim(), unit: newProduct.unit.trim(), price: Number(newProduct.price), stock: Number(newProduct.stock) };
          await db.collection('products').doc(added.code).set(added);
          setNewProduct({code:'',name:'',unit:'Hộp',price:'',stock:''});
          setShowAddProduct(false);
          showToast('✅ Đã thêm sản phẩm!');
        } catch(e) { setAddError('Lỗi: ' + e.message); }
      };

      // Dashboard stats
      const stats = useMemo(() => {
        const today = new Date().toDateString();
        const todayOrders = orders.filter(o => new Date(o.datetime).toDateString() === today && o.status !== 'cancelled');
        const todayRev = todayOrders.reduce((s,o) => s+o.total, 0);
        const totalRev = orders.filter(o=>o.status!=='cancelled').reduce((s,o) => s+o.total, 0);
        const sales = {};
        orders.filter(o=>o.status!=='cancelled').forEach(o => o.items.forEach(i => {
          if (!sales[i.name]) sales[i.name] = {qty:0,rev:0};
          sales[i.name].qty += i.quantity; sales[i.name].rev += i.price*i.quantity;
        }));
        const top = Object.entries(sales).sort((a,b)=>b[1].rev-a[1].rev).slice(0,5);
        const cats = {};
        orders.filter(o=>o.status!=='cancelled').forEach(o => o.items.forEach(i => { const c=i.unit||'Other'; cats[c]=(cats[c]||0)+i.price*i.quantity; }));
        const days = [];
        for (let i=6;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); const ds=d.toDateString(); days.push({ date:d.toLocaleDateString('vi-VN',{month:'short',day:'numeric'}), revenue:orders.filter(o=>new Date(o.datetime).toDateString()===ds).reduce((s,o)=>s+o.total,0) }); }
        return {todayRev,totalRev,totalOrders:orders.filter(o=>o.status!=='cancelled').length,todayOrders:todayOrders.length,top,cats,days};
      }, [orders]);

      useEffect(() => {
        if (view!=='dashboard'||!window.Chart) return;

          if (chartRef1.current && stats.days.length) {
            if (chart1.current) chart1.current.destroy();
            chart1.current = new Chart(chartRef1.current, { type:'line', data:{ labels:stats.days.map(d=>d.date), datasets:[{label:'Doanh thu',data:stats.days.map(d=>d.revenue),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.4,fill:true}] }, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}} });
          }
          if (chartRef2.current && Object.keys(stats.cats).length) {
            if (chart2.current) chart2.current.destroy();
            chart2.current = new Chart(chartRef2.current, { type:'doughnut', data:{ labels:Object.keys(stats.cats), datasets:[{data:Object.values(stats.cats),backgroundColor:['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316']}] }, options:{responsive:true,maintainAspectRatio:false} });
          }

        return () => { if(chart1.current) chart1.current.destroy(); if(chart2.current) chart2.current.destroy(); };

      const lowStock = products.filter(p => p.stock < 20);

                </button>

                  <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.6rem'}}>
                    {filtered.map(p => {
                      const isLow = p.stock < 20, isOut = p.stock <= 0;

                          {!isOut && isLow && <span style={{position:'absolute',top:'6px',right:'6px',background:'#f97316',color:'white',fontSize:'0.6rem',fontWeight:'bold',padding:'1px 6px',borderRadius:'999px'}}>Sắp hết</span>}
                          <h3 style={{margin:'0 0 0.25rem',fontSize:'0.85rem',fontWeight:'bold',paddingRight: isLow||isOut ? '3rem' : '0',lineHeight:1.3}}>{p.name}</h3>

                              <p style={{margin:0,fontSize:'0.75rem',fontWeight:'600',color: isOut ? '#ef4444' : isLow ? '#f97316' : '#9ca3af'}}>Còn: {p.stock}</p>
                            </div>
                            <button className="btn" style={{padding:'0.4rem 0.75rem',fontSize:'1.2rem',lineHeight:1}} disabled={isOut}>+</button>
                          </div>
                        </div>

                        });
                      });
                      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='Orders_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
                    }} className="btn" style={{padding:'0.5rem 0.9rem',fontSize:'0.8rem'}}>⬇ Export</button>
                  )}
                </div>
                {orders.length === 0
                  ? <p style={{textAlign:'center',color:'#9ca3af',padding:'2rem 0'}}>Chưa có đơn hàng</p>
                  : orders.map(o => {
                    const isCancelled = o.status === 'cancelled';
                    return (
                    <div key={o.id} style={{background: isCancelled ? '#fef2f2' : 'white', borderRadius:'0.75rem', padding:'0.75rem', marginBottom:'0.75rem', border: isCancelled ? '1.5px solid #fecaca' : 'none', opacity: isCancelled ? 0.8 : 1}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.4rem'}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:'0.4rem',flexWrap:'wrap'}}>
                            <p style={{margin:0,fontWeight:'bold',fontSize:'0.8rem',color: isCancelled ? '#9ca3af' : '#374151'}}>{o.id}</p>
                            {isCancelled && <span style={{background:'#fee2e2',color:'#b91c1c',fontSize:'0.6rem',padding:'1px 7px',borderRadius:'999px',fontWeight:'700'}}>ĐÃ HUỶ</span>}
                          </div>
                          <p style={{margin:0,fontSize:'0.75rem',color:'#6b7280'}}>{new Date(o.datetime).toLocaleString('vi-VN')}</p>
                          <p style={{margin:0,fontSize:'0.75rem',color: isCancelled ? '#9ca3af' : '#059669',fontWeight:'600'}}>👤 {o.employee||'N/A'}</p>
                          {isCancelled && <p style={{margin:0,fontSize:'0.7rem',color:'#ef4444'}}>Huỷ bởi: {o.cancelledBy} • {o.cancelledAt ? new Date(o.cancelledAt).toLocaleString('vi-VN') : ''}</p>}
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          <p style={{margin:'0 0 0.4rem',fontSize:'1.1rem',fontWeight:'bold',color: isCancelled ? '#9ca3af' : '#047857', textDecoration: isCancelled ? 'line-through' : 'none'}}>{o.total.toLocaleString()}₫</p>
                          <div style={{display:'flex',gap:'0.3rem',justifyContent:'flex-end'}}>
                            {!isCancelled && <button onClick={()=>printReceipt(o)} style={{background:'#10b981',color:'white',border:'none',padding:'0.2rem 0.6rem',borderRadius:'0.25rem',cursor:'pointer',fontSize:'0.75rem'}}>🖨 In</button>}
                            {!isCancelled && <button onClick={()=>cancelOrder(o)} style={{background:'#fee2e2',color:'#ef4444',border:'1px solid #fecaca',padding:'0.2rem 0.6rem',borderRadius:'0.25rem',cursor:'pointer',fontSize:'0.75rem',fontWeight:'700'}}>✕ Huỷ</button>}
                          </div>
                        </div>
                      </div>
                      {o.items.map((item,idx) => (
                        <div key={idx} style={{fontSize:'0.8rem',color: isCancelled ? '#9ca3af' : '#6b7280',display:'flex',justifyContent:'space-between',padding:'0.2rem 0',borderTop:'1px solid #f3f4f6'}}>
                          <span style={{textDecoration: isCancelled ? 'line-through' : 'none'}}>{item.name} × {item.quantity}</span>
                          <span>{(item.price*item.quantity).toLocaleString()}₫</span>
                        </div>
                      ))}
                    </div>
                    );
                  })
                }
              </div>
            )}

            {/* Dashboard View */}
            {view === 'dashboard' && (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.75rem',marginBottom:'0.75rem'}}>
                  {[
                    {label:"Hôm nay",val:stats.todayRev,sub:`${stats.todayOrders} đơn`},
                    {label:"Tổng doanh thu",val:stats.totalRev,sub:`${stats.totalOrders} đơn`}
                  ].map(({label,val,sub}) => (
                    <div key={label} className="glass" style={{borderRadius:'1rem',padding:'1rem'}}>
                      <p style={{margin:'0 0 0.25rem',fontSize:'0.75rem',fontWeight:'600',color:'#6b7280'}}>{label}</p>
                      <p style={{margin:0,fontSize:'1.3rem',fontWeight:'bold',color:'#047857'}}>{val.toLocaleString()}₫</p>
                      <p style={{margin:'0.2rem 0 0',fontSize:'0.7rem',color:'#9ca3af'}}>{sub}</p>
                    </div>
                  ))}
                </div>
                {stats.days.length > 0 && (
                  <div style={{display:'grid',gridTemplateColumns: isMobile ? '1fr' : 'repeat(2,1fr)',gap:'0.75rem',marginBottom:'0.75rem'}}>
                    <div className="glass" style={{borderRadius:'1rem',padding:'1rem'}}>
                      <h3 style={{margin:'0 0 0.75rem',fontSize:'0.9rem'}}>📈 Doanh thu 7 ngày</h3>
                      <div style={{height:'200px'}}><canvas ref={chartRef1}></canvas></div>
                    </div>
                    {Object.keys(stats.cats).length > 0 && (
                      <div className="glass" style={{borderRadius:'1rem',padding:'1rem'}}>
                        <h3 style={{margin:'0 0 0.75rem',fontSize:'0.9rem'}}>🗂 Theo danh mục</h3>
                        <div style={{height:'200px'}}><canvas ref={chartRef2}></canvas></div>
                      </div>
                    )}
                  </div>
                )}
                <div className="glass" style={{borderRadius:'1rem',padding:'1rem'}}>
                  <h3 style={{margin:'0 0 0.75rem',fontSize:'0.9rem'}}>🏆 Top sản phẩm</h3>
                  {stats.top.length === 0
                    ? <p style={{textAlign:'center',color:'#9ca3af',padding:'1rem 0',fontSize:'0.875rem'}}>Chưa có dữ liệu</p>
                    : stats.top.map(([name,data],idx) => (
                      <div key={name} style={{display:'flex',alignItems:'center',gap:'0.75rem',background:'white',borderRadius:'0.5rem',padding:'0.75rem',marginBottom:'0.5rem'}}>
                        <div style={{width:'1.75rem',height:'1.75rem',background:'#10b981',borderRadius:'0.5rem',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'bold',fontSize:'0.85rem',flexShrink:0}}>{idx+1}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{margin:0,fontWeight:'600',fontSize:'0.85rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{name}</p>
                          <p style={{margin:0,fontSize:'0.75rem',color:'#6b7280'}}>{data.qty} sản phẩm</p>
                        </div>
                        <p style={{margin:0,fontSize:'0.95rem',fontWeight:'bold',color:'#047857',flexShrink:0}}>{data.rev.toLocaleString()}₫</p>
                      </div>
                    ))
                  }
                </div>
              </div>
            )}
          </div>

          {/* Staff Management View */}
          {view === 'staff' && currentUser?.role === 'manager' && (
            <div>
              <div className="glass" style={{borderRadius:'1rem',padding:'1rem',marginBottom:'0.75rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
                  <h2 style={{margin:0,fontSize:'1rem'}}>👥 Quản lý nhân viên ({staffList.length})</h2>
                  <button onClick={()=>{setStaffError('');setShowAddStaff(true);}} className="btn" style={{padding:'0.5rem 0.9rem',fontSize:'0.8rem',background:'linear-gradient(135deg,#3b82f6,#6366f1)'}}>+ Thêm NV</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'0.6rem'}}>
                  {staffList.map(s => (
                    <div key={s.name} style={{background:'white',borderRadius:'0.75rem',padding:'0.75rem 1rem',display:'flex',alignItems:'center',gap:'0.75rem',boxShadow:'0 2px 4px rgba(0,0,0,0.06)'}}>
                      <div style={{width:'2.5rem',height:'2.5rem',borderRadius:'50%',background: s.role==='manager' ? 'linear-gradient(135deg,#f59e0b,#d97706)' : 'linear-gradient(135deg,#10b981,#059669)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',flexShrink:0}}>
                        {s.role==='manager' ? '👑' : '👤'}
                      </div>
                      <div style={{flex:1}}>
                        <p style={{margin:0,fontWeight:'700',fontSize:'0.95rem'}}>{s.name}</p>
                        <p style={{margin:0,fontSize:'0.75rem',color:'#6b7280'}}>
                          {s.role==='manager' ? 'Quản lý' : 'Nhân viên'} • PIN: {'●'.repeat(4)}
                          {s.name === currentUser?.name && <span style={{marginLeft:'6px',background:'#d1fae5',color:'#047857',fontSize:'0.65rem',padding:'1px 6px',borderRadius:'999px',fontWeight:'700'}}>Bạn</span>}
                        </p>
                      </div>
                      <div style={{display:'flex',gap:'0.4rem'}}>
                        <button onClick={()=>{setEditingStaff(s);setEditPin('');}} style={{background:'#eff6ff',border:'1px solid #bfdbfe',color:'#2563eb',borderRadius:'0.5rem',padding:'0.35rem 0.6rem',cursor:'pointer',fontSize:'0.75rem',fontWeight:'600'}}>✏️ PIN</button>
                        {s.name !== currentUser?.name && (
                          <button onClick={()=>deleteStaff(s.name)} style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#ef4444',borderRadius:'0.5rem',padding:'0.35rem 0.6rem',cursor:'pointer',fontSize:'0.75rem',fontWeight:'600'}}>🗑</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Mobile Bottom Nav */}
          <div style={{display: isMobile ? 'flex' : 'none', position:'fixed', bottom:0, left:0, right:0, background:'rgba(255,255,255,0.95)', backdropFilter:'blur(12px)', borderTop:'1px solid #a7f3d0', padding:'0.5rem', gap:'0.25rem', zIndex:50}}>
            {[['pos','🛒','POS'],['products','📦','Kho'],['orders','📋','Đơn'],['dashboard','📊','Thống kê'],['staff','👥','NV']].filter(([v]) => {
              if ((v==='dashboard'||v==='staff') && currentUser?.role !== 'manager') return false;
              return true;
            }).map(([v,icon,label]) => (
              <button key={v} onClick={()=>setView(v)} className="nav-btn"
                style={{background: view===v ? '#d1fae5' : 'transparent', color: view===v ? '#047857' : '#6b7280', display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'0.4rem 0'}}>
                <span style={{fontSize:'1.2rem'}}>{icon}</span>
                <span style={{fontSize:'0.65rem',fontWeight:'700'}}>{label}</span>
                {v==='products' && lowStock.length>0 && <span style={{position:'absolute',top:'4px',right:'4px',background:'#ef4444',color:'white',borderRadius:'999px',fontSize:'0.55rem',fontWeight:'bold',padding:'1px 4px'}}>{lowStock.length}</span>}
              </button>
            ))}
          </div>

          {/* Add Product Modal */}
          {showAddProduct && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',zIndex:200}}>
              <div className="glass" style={{borderRadius:'1rem',padding:'1.5rem',maxWidth:'24rem',width:'100%',maxHeight:'90vh',overflowY:'auto'}}>
                <h2 style={{margin:'0 0 1rem',fontSize:'1rem'}}>➕ Thêm sản phẩm mới</h2>
                {[{label:'Mã SP *',key:'code',placeholder:'VD: SP099999',type:'text'},{label:'Tên SP *',key:'name',placeholder:'VD: Vitamin D3',type:'text'},{label:'Đơn vị *',key:'unit',placeholder:'Hộp, Vỉ, Ống...',type:'text'},{label:'Giá (₫) *',key:'price',placeholder:'50000',type:'number'},{label:'Tồn kho *',key:'stock',placeholder:'50',type:'number'}].map(({label,key,placeholder,type}) => (
                  <div key={key} style={{marginBottom:'0.6rem'}}>
                    <label style={{display:'block',fontWeight:'600',fontSize:'0.8rem',marginBottom:'0.2rem',color:'#374151'}}>{label}</label>
                    <input type={type} placeholder={placeholder} value={newProduct[key]} onChange={e=>setNewProduct({...newProduct,[key]:e.target.value})} style={{fontSize:'0.95rem'}} />
                  </div>
                ))}
                {addError && <p style={{color:'#dc2626',fontWeight:'600',margin:'0.5rem 0',fontSize:'0.8rem'}}>⚠️ {addError}</p>}
                <div style={{display:'flex',gap:'0.5rem',marginTop:'1rem'}}>
                  <button onClick={saveNewProduct} className="btn" style={{flex:1,fontSize:'0.9rem'}}>💾 Lưu</button>
                  <button onClick={()=>{setShowAddProduct(false);setAddError('');}} style={{flex:1,padding:'0.75rem',borderRadius:'0.5rem',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:'600',color:'#6b7280',fontSize:'0.9rem'}}>Huỷ</button>
                </div>
              </div>
            </div>
          )}

          {/* Receipt Modal */}
          {showReceipt && lastOrder && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',zIndex:100}}>
              <div className="glass" style={{borderRadius:'1rem',padding:'1.5rem',maxWidth:'26rem',width:'100%'}}>
                <h2 style={{margin:'0 0 0.75rem',textAlign:'center',fontSize:'1.1rem'}}>✅ Đơn hàng hoàn tất!</h2>
                <p style={{margin:'0 0 0.75rem',textAlign:'center',color:'#6b7280',fontSize:'0.8rem'}}>{lastOrder.id}</p>
                <div style={{background:'white',borderRadius:'0.75rem',padding:'0.75rem',marginBottom:'0.75rem'}}>
                  {lastOrder.items.map((item,idx) => (
                    <div key={idx} style={{display:'flex',justifyContent:'space-between',fontSize:'0.85rem',marginBottom:'0.4rem'}}>
                      <span>{item.name} × {item.quantity}</span>
                      <span style={{fontWeight:'600'}}>{(item.price*item.quantity).toLocaleString()}₫</span>
                    </div>
                  ))}
                  <div style={{borderTop:'1px solid #e5e7eb',paddingTop:'0.6rem',marginTop:'0.6rem',display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontWeight:'bold'}}>Tổng:</span>
                    <span style={{fontSize:'1.3rem',fontWeight:'bold',color:'#047857'}}>{lastOrder.total.toLocaleString()}₫</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button onClick={()=>printReceipt(lastOrder)} className="btn" style={{flex:1,fontSize:'0.9rem'}}>🖨 In hoá đơn</button>
                  <button onClick={()=>setShowReceipt(false)} style={{flex:1,padding:'0.75rem',borderRadius:'0.5rem',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:'600',color:'#6b7280',fontSize:'0.9rem'}}>Đóng</button>
                </div>
              </div>
            </div>
          )}

          {/* Add Staff Modal */}
          {showAddStaff && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',zIndex:200}}>
              <div className="glass" style={{borderRadius:'1rem',padding:'1.5rem',maxWidth:'22rem',width:'100%'}}>
                <h2 style={{margin:'0 0 1rem',fontSize:'1rem'}}>➕ Thêm nhân viên mới</h2>
                <div style={{marginBottom:'0.6rem'}}>
                  <label style={{display:'block',fontWeight:'600',fontSize:'0.8rem',marginBottom:'0.2rem'}}>Tên nhân viên *</label>
                  <input type="text" placeholder="VD: Sương" value={newStaff.name} onChange={e=>setNewStaff({...newStaff,name:e.target.value})} />
                </div>
                <div style={{marginBottom:'0.6rem'}}>
                  <label style={{display:'block',fontWeight:'600',fontSize:'0.8rem',marginBottom:'0.2rem'}}>PIN (4 chữ số) *</label>
                  <input type="number" placeholder="VD: 1234" value={newStaff.pin} onChange={e=>setNewStaff({...newStaff,pin:e.target.value.slice(0,4)})} />
                </div>
                <div style={{marginBottom:'0.75rem'}}>
                  <label style={{display:'block',fontWeight:'600',fontSize:'0.8rem',marginBottom:'0.2rem'}}>Vai trò *</label>
                  <select value={newStaff.role} onChange={e=>setNewStaff({...newStaff,role:e.target.value})}>
                    <option value="staff">👤 Nhân viên</option>
                    <option value="manager">👑 Quản lý</option>
                  </select>
                </div>
                {staffError && <p style={{color:'#dc2626',fontWeight:'600',margin:'0.4rem 0',fontSize:'0.8rem'}}>⚠️ {staffError}</p>}
                <div style={{display:'flex',gap:'0.5rem',marginTop:'1rem'}}>
                  <button onClick={saveNewStaff} className="btn" style={{flex:1,fontSize:'0.9rem'}}>💾 Lưu</button>
                  <button onClick={()=>{setShowAddStaff(false);setStaffError('');}} style={{flex:1,padding:'0.75rem',borderRadius:'0.5rem',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:'600',color:'#6b7280',fontSize:'0.9rem'}}>Huỷ</button>
                </div>
              </div>
            </div>
          )}

          {/* Edit PIN Modal */}
          {editingStaff && (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',zIndex:200}}>
              <div className="glass" style={{borderRadius:'1rem',padding:'1.5rem',maxWidth:'22rem',width:'100%'}}>
                <h2 style={{margin:'0 0 0.75rem',fontSize:'1rem'}}>✏️ Đổi PIN — {editingStaff.name}</h2>
                <p style={{margin:'0 0 0.75rem',fontSize:'0.85rem',color:'#6b7280'}}>Nhập PIN mới (4 chữ số)</p>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.5rem',marginBottom:'1rem'}}>
                  {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i) => (
                    <button key={i} onClick={() => {
                      if (d==='') return;
                      if (d==='⌫') { setEditPin(p=>p.slice(0,-1)); return; }
                      if (editPin.length < 4) setEditPin(p=>p+d);
                    }}
                      style={{padding:'0.9rem',borderRadius:'0.75rem',border:'2px solid #e5e7eb',background:d===''?'transparent':'white',cursor:d===''?'default':'pointer',fontSize:'1.2rem',fontWeight:'700',color:'#374151'}}>
                      {d}
                    </button>
                  ))}
                </div>
                <div style={{display:'flex',justifyContent:'center',gap:'0.75rem',marginBottom:'1rem'}}>
                  {[0,1,2,3].map(i=>(
                    <div key={i} style={{width:'0.9rem',height:'0.9rem',borderRadius:'50%',background:editPin.length>i?'#10b981':'#e5e7eb',border:'2px solid',borderColor:editPin.length>i?'#10b981':'#d1d5db'}}></div>
                  ))}
                </div>
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button onClick={saveEditPin} disabled={editPin.length!==4} className="btn" style={{flex:1,fontSize:'0.9rem'}}>💾 Lưu PIN mới</button>
                  <button onClick={()=>{setEditingStaff(null);setEditPin('');}} style={{flex:1,padding:'0.75rem',borderRadius:'0.5rem',border:'2px solid #e5e7eb',background:'white',cursor:'pointer',fontWeight:'600',color:'#6b7280',fontSize:'0.9rem'}}>Huỷ</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
